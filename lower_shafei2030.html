<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>حصر الغياب – المرحلة الدنيا</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e;padding:10px 8px 80px;}
header{text-align:center;margin-bottom:10px;padding:14px;background:linear-gradient(120deg,#1a1a2e,#0f3460);border-radius:14px;box-shadow:0 4px 16px rgba(15,52,96,.25)}
header h1{font-size:1.25rem;font-weight:900;color:#fff}
header p{color:#a8c4e0;font-size:.72rem;margin-top:2px}
.hd{display:inline-block;background:rgba(255,255,255,.12);color:#ffd166;font-size:.75rem;font-weight:700;padding:2px 12px;border-radius:20px;margin-top:5px}
.sb{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:10px;padding:7px 12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);flex-wrap:wrap;gap:4px}
.ss{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700}
.sd{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.sd.synced{background:#2a9d8f;box-shadow:0 0 0 3px rgba(42,157,143,.2)}
.sd.syncing{background:#f4a261;animation:bl 1s infinite}
.sd.error{background:#e63946}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.st{font-size:.65rem;color:#aaa}
.srb{padding:5px 11px;border:none;border-radius:8px;background:#0f3460;color:#fff;font-family:'Tajawal',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer}
.day-stats{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.day-stats h2{font-size:.82rem;font-weight:800;margin-bottom:8px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat-box{border-radius:10px;padding:8px 5px;text-align:center}
.stat-box.tot{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff}
.stat-box.s1{background:linear-gradient(135deg,#fff0f1,#ffd6d8)}
.stat-box.s2{background:linear-gradient(135deg,#e8faf8,#b7e4df)}
.stat-box.s3{background:linear-gradient(135deg,#fffbf0,#fde8b2)}
.stat-n{font-size:1.4rem;font-weight:900;line-height:1}
.stat-l{font-size:.55rem;font-weight:700;opacity:.7;margin-top:2px}
.stat-p{font-size:.6rem;font-weight:800;margin-top:2px;padding:1px 5px;border-radius:8px;display:inline-block}
.stat-box.tot .stat-n{color:#ffd166}.stat-box.tot .stat-p{background:rgba(255,255,255,.15);color:#ffd166}
.stat-box.s1 .stat-n{color:#9d0208}.stat-box.s1 .stat-p{background:rgba(230,57,70,.1);color:#9d0208}
.stat-box.s2 .stat-n{color:#1a6b61}.stat-box.s2 .stat-p{background:rgba(42,157,143,.1);color:#1a6b61}
.stat-box.s3 .stat-n{color:#b5742a}.stat-box.s3 .stat-p{background:rgba(244,162,97,.15);color:#b5742a}
.stages{display:flex;flex-direction:column;gap:10px}
.stb{border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);background:#fff}
.sth{padding:10px 13px;font-size:.95rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.stage1 .sth{background:linear-gradient(90deg,#9d0208,#e63946)}
.stage2 .sth{background:linear-gradient(90deg,#1a6b61,#2a9d8f)}
.stage3 .sth{background:linear-gradient(90deg,#b5742a,#f4a261)}
.si{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.sbg{margin-right:auto;background:rgba(255,255,255,.2);padding:2px 9px;border-radius:20px;font-size:.65rem;font-weight:700}
.cls-body{display:none;padding:10px}
.cls-body.open{display:block}
.cls-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.cls-btn{border:none;border-radius:11px;padding:12px 8px;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;transition:transform .15s}
.cls-btn:active{transform:scale(.96)}
.stage1 .cls-btn{background:#fff0f1;color:#9d0208;box-shadow:0 2px 8px rgba(230,57,70,.12)}
.stage2 .cls-btn{background:#e8faf8;color:#1a6b61;box-shadow:0 2px 8px rgba(42,157,143,.12)}
.stage3 .cls-btn{background:#fffbf0;color:#b5742a;box-shadow:0 2px 8px rgba(244,162,97,.12)}
.cls-name{font-size:.8rem;font-weight:800}
.cls-abs{font-size:.68rem;font-weight:600;opacity:.7}
.cls-badge{position:absolute;top:6px;left:6px;background:#c1121f;color:#fff;font-size:.58rem;font-weight:800;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center}
.pop-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:none;align-items:flex-end;justify-content:center}
.pop-ov.show{display:flex}
.pop{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;animation:su .22s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pop-head{padding:13px 16px 8px;border-bottom:1.5px solid #f0f0f0;flex-shrink:0;position:relative}
.pop-title{font-size:.98rem;font-weight:800}
.pop-sub{font-size:.7rem;color:#999;margin-top:2px}
.pop-close{position:absolute;top:11px;left:14px;width:28px;height:28px;border-radius:50%;background:#f0f0f0;border:none;font-size:1rem;cursor:pointer}
.pop-summary{padding:6px 14px;background:#f8f8f8;border-bottom:1px solid #eee;font-size:.7rem;color:#555;display:flex;gap:14px;flex-shrink:0;flex-wrap:wrap}
.pop-summary b{color:#1a1a2e}
.stu-list{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}
.stu-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;margin-bottom:5px;background:#fafafa;cursor:pointer;user-select:none}
.stu-row.absent{background:#fff0f0}
.stu-row.selected{outline:2px solid #e63946}
.stu-num{font-size:.65rem;color:#bbb;font-weight:700;width:18px;text-align:center;flex-shrink:0}
.stu-name{flex:1;font-size:.82rem;font-weight:600;line-height:1.3}
.stu-chk{width:28px;height:28px;border-radius:8px;background:#f0f0f0;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;flex-shrink:0}
.stu-row.absent .stu-chk{background:#fff0f0;color:#c1121f;border-color:#ffc8c8}
.pop-foot{padding:10px 14px;border-top:1.5px solid #f0f0f0;display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.pop-foot button{flex:1;padding:10px;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}
.btn-wa{background:#25d366;color:#fff}
.btn-add{background:#e63946;color:#fff}
.btn-edit{background:#2a9d8f;color:#fff}
.btn-del{background:#eee;color:#555}
.btn-noabsent{background:#e8faf8;color:#1a6b61;width:100%!important;margin-top:4px;}
.btn-noabsent.confirmed{background:#2a9d8f;color:#fff;}
.btn-excel{background:#1b5e20;color:#fff;width:100%!important;margin-top:4px;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:flex-end;justify-content:center}
.mo.show{display:flex}
.md{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px 38px;width:100%;max-width:500px}
.md h3{font-size:.95rem;font-weight:800;margin-bottom:10px}
.md input{width:100%;padding:11px 13px;border:1.5px solid #ddd;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.92rem;margin-bottom:12px;outline:none}
.md input:focus{border-color:#e63946}
.mdb{display:flex;gap:8px}
.mdb button{flex:1;padding:10px;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer}
.bc{background:#e63946;color:#fff}.bx{background:#eee;color:#444}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:8px 18px;border-radius:24px;font-size:.8rem;font-weight:600;z-index:9999;transition:transform .28s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.action-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid #eee;padding:9px 12px;display:flex;gap:7px;z-index:500;box-shadow:0 -2px 10px rgba(0,0,0,.07)}
.action-bar button{flex:1;padding:9px;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer}
.a-add{background:#e63946;color:#fff}
.a-edit{background:#2a9d8f;color:#fff}
.a-del{background:#555;color:#fff}
.ls{position:fixed;inset:0;background:linear-gradient(135deg,#9d0208,#e63946);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
.ls.hide{opacity:0;pointer-events:none}
.ls-logo{font-size:3.5rem}
.ls-title{color:#fff;font-size:1.1rem;font-weight:800}
.ls-sub{color:rgba(255,255,255,.8);font-size:.78rem}
.ls-dots{display:flex;gap:8px;margin-top:4px}
.ls-dots span{width:10px;height:10px;border-radius:50%;background:#ffd166;animation:dt 1.2s infinite}
.ls-dots span:nth-child(2){animation-delay:.2s}
.ls-dots span:nth-child(3){animation-delay:.4s}
@keyframes dt{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="ls" id="ls">
  <div class="ls-logo">👦</div>
  <div class="ls-title">حصر الغياب – المرحلة الدنيا</div>
  <div class="ls-sub">جارٍ الاتصال بالخادم...</div>
  <div class="ls-dots"><span></span><span></span><span></span></div>
</div>
<header>
  <h1>📋 حصر الغياب – المرحلة الدنيا</h1>
  <p>مشترك بين جميع المعلمين • يتحدث تلقائياً</p>
  <div class="hd" id="hDate">...</div>
</header>
<div class="sb">
  <div class="ss"><div class="sd syncing" id="sDot"></div><span id="sTxt">جارٍ الاتصال...</span></div>
  <span class="st" id="sTime"></span>
  <button class="srb" onclick="manualRefresh()">🔄 تحديث</button>
</div>
<div class="day-stats">
  <h2>📊 إجمالي غياب اليوم</h2>
  <div class="stats-grid">
    <div class="stat-box tot"><div class="stat-n" id="gAll">0</div><div class="stat-l">الكلي</div><div class="stat-p" id="gPct">0%</div></div>
    <div class="stat-box s1"><div class="stat-n" id="gS1">0</div><div class="stat-l">الأول</div><div class="stat-p" id="pS1">0%</div></div>
    <div class="stat-box s2"><div class="stat-n" id="gS2">0</div><div class="stat-l">الثاني</div><div class="stat-p" id="pS2">0%</div></div>
    <div class="stat-box s3"><div class="stat-n" id="gS3">0</div><div class="stat-l">الثالث</div><div class="stat-p" id="pS3">0%</div></div>
  </div>
</div>
<div class="stages" id="stg"></div>

<div class="pop-ov" id="popOv" onclick="closePop(event)">
  <div class="pop">
    <div class="pop-head">
      <button class="pop-close" onclick="document.getElementById('popOv').classList.remove('show')">✕</button>
      <div class="pop-title" id="popTitle"></div>
      <div class="pop-sub" id="popSub"></div>
    </div>
    <div class="pop-summary" id="popSum"></div>
    <div class="stu-list" id="stuList"></div>
    <div class="pop-foot">
      <button class="btn-del" onclick="actionDel()">🗑️</button>
      <button class="btn-edit" onclick="actionEdit()">✏️</button>
      <button class="btn-add" onclick="actionAdd()">➕</button>
      <button class="btn-wa" onclick="sendWA()">💬 واتساب</button>
      <button class="btn-noabsent" id="btnNoAbsent" onclick="confirmNoAbsent()">✅ لا يوجد غياب اليوم</button>
      <button class="btn-excel" onclick="exportClassExcel()">📥 تصدير Excel</button>
    </div>
  </div>
</div>

<div class="mo" id="mo">
  <div class="md">
    <h3 id="mT"></h3>
    <input type="text" id="mI" placeholder="أدخل الاسم...">
    <div class="mdb">
      <button class="bx" id="mC">إلغاء</button>
      <button class="bc" id="mO">تأكيد</button>
    </div>
  </div>
</div>
<div class="toast" id="tst"></div>
<div class="action-bar">
  <button class="a-del" onclick="actionDel()">🗑️ حذف</button>
  <button class="a-edit" onclick="actionEdit()">✏️ تعديل</button>
  <button class="a-add" onclick="actionAdd()">➕ إضافة</button>
</div>

<script type="module">

const STUDENTS_KEY='lower_students_v1';
function todayKey(){const d=new Date();return`lower_d_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;}
function noAbsentKey(){const d=new Date();return`lower_no_absent_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;}

let ST={},ATT={},NO_ABSENT={},sv=false,fbListener=null,curPop={sg:null,k:null},selStu=null;
let mM=null,mT2=null;

function buildDefaultST(){const r={};SM.forEach((sg,si)=>{r[sg.id]={};sg.cls.forEach((_,ci)=>{r[sg.id][`c${ci}`]=(DS[sg.id][`c${ci}`]||[]).map((n,i)=>({id:`s${si}c${ci}i${i}`,name:n}));});});return r;}
function initAtt(){SM.forEach(sg=>{ATT[sg.id]={};sg.cls.forEach((_,ci)=>{ATT[sg.id][`c${ci}`]={};});});}
function setSUI(s,m){document.getElementById('sDot').className='sd '+s;document.getElementById('sTxt').textContent=m;if(s==='synced')document.getElementById('sTime').textContent='آخر تحديث: '+new Date().toLocaleTimeString('ar');}
async function saveStudents(){try{await set(ref(db,STUDENTS_KEY),ST);}catch(e){}}
async function saveNoAbsent(){try{await set(ref(db,noAbsentKey()),NO_ABSENT);}catch(e){}}
async function fbS(){if(sv)return;sv=true;setSUI('syncing','جارٍ الحفظ...');try{await set(ref(db,todayKey()),ATT);setSUI('synced','محفوظ ✅');}catch(e){setSUI('error','خطأ في الحفظ');}finally{sv=false;}}

async function fbL(){
  setSUI('syncing','جارٍ التحميل...');initAtt();
  try{
    const stuSnap=await get(ref(db,STUDENTS_KEY));
    if(stuSnap.exists()){ST=stuSnap.val();SM.forEach((sg,si)=>{if(!ST[sg.id])ST[sg.id]={};sg.cls.forEach((_,ci)=>{if(!ST[sg.id][`c${ci}`])ST[sg.id][`c${ci}`]=(DS[sg.id][`c${ci}`]||[]).map((n,i)=>({id:`s${si}c${ci}i${i}`,name:n}));});});}
    else{ST=buildDefaultST();await saveStudents();}
    const[attSnap,naSnap]=await Promise.all([get(ref(db,todayKey())),get(ref(db,noAbsentKey()))]);
    if(attSnap.exists()){const data=attSnap.val();SM.forEach(sg=>{sg.cls.forEach((_,ci)=>{const k=`c${ci}`;if(data[sg.id]&&data[sg.id][k])ATT[sg.id][k]=data[sg.id][k];});});setSUI('synced','متزامن ✅');}
    else{setSUI('synced','يوم جديد ✅');}
    NO_ABSENT=naSnap.exists()?naSnap.val():{};
  }catch(e){setSUI('error','تعذر الاتصال');}
  renderAll();
  setTimeout(()=>{const ls=document.getElementById('ls');if(ls){ls.classList.add('hide');setTimeout(()=>ls.remove(),400);}},300);
}

function fbLs(){
  if(fbListener)fbListener();
  fbListener=onValue(ref(db,todayKey()),(snap)=>{
    if(!snap.exists()||sv)return;
    const data=snap.val();SM.forEach(sg=>{sg.cls.forEach((_,ci)=>{const k=`c${ci}`;if(data[sg.id]&&data[sg.id][k])ATT[sg.id][k]=data[sg.id][k];});});
    setSUI('synced','متزامن ✅');updStats();updBtns();if(curPop.sg)renderPopList();
  });
}

window.manualRefresh=async()=>{await fbL();fbLs();showT('تم التحديث ✅');};

function clsAbs(sid,k){return Object.values(ATT[sid][k]||{}).filter(v=>v).length;}
function sgAbs(sid){let t=0;SM.find(s=>s.id===sid).cls.forEach((_,ci)=>{t+=clsAbs(sid,`c${ci}`);});return t;}
function sgTotal(sid){let t=0;ST[sid]&&Object.values(ST[sid]).forEach(arr=>{t+=arr.length;});return t;}

function updStats(){let g=0,gp=0;SM.forEach((sg,si)=>{const abs=sgAbs(sg.id);const tot=sgTotal(sg.id);const pct=tot>0?Math.round(abs/tot*100):0;g+=abs;gp+=tot;document.getElementById(`gS${si+1}`).textContent=abs;document.getElementById(`pS${si+1}`).textContent=pct+'%';});document.getElementById('gAll').textContent=g;document.getElementById('gPct').textContent=(gp>0?Math.round(g/gp*100):0)+'%';}
function updBtns(){SM.forEach(sg=>{sg.cls.forEach((_,ci)=>{const k=`c${ci}`;const cnt=clsAbs(sg.id,k);const b=document.getElementById(`badge_${sg.id}_${k}`);if(b){b.textContent=cnt;b.style.display=cnt>0?'block':'none';}const a=document.getElementById(`clsabs_${sg.id}_${k}`);if(a)a.textContent=`غياب: ${cnt}`;});const bg=document.getElementById(`bg_${sg.id}`);if(bg)bg.textContent=`غياب: ${sgAbs(sg.id)}`;});}

function toH(date){const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();const jd=Math.floor((1461*(y+4800+Math.floor((m-14)/12)))/4)+Math.floor((367*(m-2-12*(Math.floor((m-14)/12))))/12)-Math.floor((3*(Math.floor((y+4900+Math.floor((m-14)/12))/100)))/4)+d-32075;let l=jd-1948440+10632;const n=Math.floor((l-1)/10631);l=l-10631*n+354;const j=(Math.floor((10985-l)/5316))*(Math.floor((50*l)/17719))+(Math.floor(l/5670))*(Math.floor((43*l)/15238));l=l-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29;const hm=Math.floor((24*l)/709);const hd=l-Math.floor((709*hm)/24)-2;return{y:30*n+j-30,m:hm,d:hd<1?1:hd};}
function hMo(m){return['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'][m-1]||'';}

function renderAll(){
  const now=new Date();const h=toH(now);
  document.getElementById('hDate').textContent=`${DN[now.getDay()]} ${h.d} ${hMo(h.m)} ${h.y}هـ`;
  updStats();const cont=document.getElementById('stg');cont.innerHTML='';
  SM.forEach((sg,si)=>{
    const block=document.createElement('div');block.className=`stb ${sg.color}`;
    let btns='';
    sg.cls.forEach((cls,ci)=>{const k=`c${ci}`;const cnt=clsAbs(sg.id,k);btns+=`<button class="cls-btn" onclick="openPop('${sg.id}','${k}')"><span class="cls-badge" id="badge_${sg.id}_${k}" style="display:${cnt>0?'block':'none'}">${cnt}</span><span class="cls-name">${cls}</span><span class="cls-abs" id="clsabs_${sg.id}_${k}">غياب: ${cnt}</span></button>`;});
    block.innerHTML=`<div class="sth" onclick="toggleSt('b_${sg.id}')"><span class="si">${sg.icon}</span>المرحلة ${sg.name}<span class="sbg" id="bg_${sg.id}">غياب: ${sgAbs(sg.id)}</span><span style="margin-right:auto;font-size:.75rem" id="arr_${sg.id}">▾</span></div><div class="cls-body ${si===0?'open':''}" id="b_${sg.id}"><div class="cls-grid">${btns}</div></div>`;
    cont.appendChild(block);
  });
}

window.toggleSt=function(bid){const b=document.getElementById(bid);const sid=bid.replace('b_','');const arr=document.getElementById(`arr_${sid}`);if(b.classList.contains('open')){b.classList.remove('open');arr.textContent='▾';}else{b.classList.add('open');arr.textContent='▴';}};

window.openPop=function(sid,k){
  try{
    curPop={sg:SM.find(s=>s.id===sid),k};selStu=null;
    document.getElementById('popTitle').textContent=`${curPop.sg.name} — ${curPop.sg.cls[parseInt(k.slice(1))]}`;
    renderPopList();renderPopSum();updateNoAbsentBtn();
    document.getElementById('popOv').classList.add('show');
    history.pushState({popup:true},'');
  }catch(e){showT('حاول مجدداً');}
};

window.addEventListener('popstate',function(){if(document.getElementById('popOv').classList.contains('show')){document.getElementById('popOv').classList.remove('show');}});
window.closePop=function(e){if(e.target===document.getElementById('popOv'))document.getElementById('popOv').classList.remove('show');};

function updateNoAbsentBtn(){
  const btn=document.getElementById('btnNoAbsent');if(!btn||!curPop.sg)return;
  const confirmed=NO_ABSENT[curPop.sg.id]&&NO_ABSENT[curPop.sg.id][curPop.k];
  if(confirmed){btn.textContent='✅ تم تأكيد لا يوجد غياب';btn.className='btn-noabsent confirmed';}
  else{btn.textContent='✅ لا يوجد غياب اليوم';btn.className='btn-noabsent';}
}

window.confirmNoAbsent=async function(){
  if(!curPop.sg)return;
  if(!NO_ABSENT[curPop.sg.id])NO_ABSENT[curPop.sg.id]={};
  NO_ABSENT[curPop.sg.id][curPop.k]=true;
  await saveNoAbsent();updateNoAbsentBtn();showT('✅ تم تسجيل لا يوجد غياب');
};

window.exportClassExcel=function(){
  if(!curPop.sg)return;
  const{sg,k}=curPop;
  const sts=ST[sg.id][k]||[];
  const att=ATT[sg.id][k]||{};
  const absent=sts.filter(s=>att[s.id]===true);
  const now=new Date();
  const dayName=`${DN[now.getDay()]} ${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}`;
  const rows=[['#','اسم الطالب','التاريخ']];
  if(absent.length===0){rows.push(['—','لا يوجد غياب',dayName]);}
  else{absent.forEach((s,i)=>rows.push([i+1,s.name,dayName]));}
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:40},{wch:20}];
  const wb=XLSX.utils.book_new();
  const sheetName=sg.cls[parseInt(k.slice(1))].replace(/\//g,'-').slice(0,31);
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  XLSX.writeFile(wb,`غياب_${sheetName}_${now.getDate()}-${now.getMonth()+1}.xlsx`);
  showT('تم تصدير Excel ✅');
};

function renderPopList(){
  const{sg,k}=curPop;const sts=ST[sg.id][k]||[];const att=ATT[sg.id][k]||{};
  const list=document.getElementById('stuList');list.innerHTML='';
  sts.forEach((s,idx)=>{
    const ab=att[s.id]===true;const sel=selStu&&selStu.stid===s.id;
    const row=document.createElement('div');
    row.className=`stu-row${ab?' absent':''}${sel?' selected':''}`;
    row.innerHTML=`<span class="stu-num">${idx+1}</span><span class="stu-name">${s.name}</span><div class="stu-chk">${ab?'غ':''}</div>`;
    row.onclick=()=>tglStu(sg.id,k,s.id,row);
    let lp=null;
    row.addEventListener('touchstart',()=>{lp=setTimeout(()=>{selStu={sid:sg.id,k,stid:s.id};renderPopList();showT('✅ تم تحديد الطالب');},600);},{passive:true});
    row.addEventListener('touchend',()=>{if(lp)clearTimeout(lp);},{passive:true});
    list.appendChild(row);
  });
}

function renderPopSum(){
  const{sg,k}=curPop;const sts=ST[sg.id][k]||[];const abs=clsAbs(sg.id,k);const pct=sts.length>0?Math.round(abs/sts.length*100):0;
  document.getElementById('popSum').innerHTML=`<span>غياب: <b>${abs}</b></span><span>حضور: <b>${sts.length-abs}</b></span><span>الإجمالي: <b>${sts.length}</b></span><span>النسبة: <b>${pct}%</b></span>`;
}

async function tglStu(sid,k,stid,row){
  if(!ATT[sid][k])ATT[sid][k]={};ATT[sid][k][stid]=!ATT[sid][k][stid];const ab=ATT[sid][k][stid];
  row.classList.toggle('absent',ab);row.querySelector('.stu-chk').textContent=ab?'غ':'';
  updStats();updBtns();renderPopSum();await fbS();
}

window.actionAdd=function(){if(!curPop.sg){showT('افتح فصلاً أولاً');return;}mM='add';mT2={sid:curPop.sg.id,k:curPop.k};document.getElementById('mT').textContent='إضافة طالب';document.getElementById('mI').value='';document.getElementById('mo').classList.add('show');setTimeout(()=>document.getElementById('mI').focus(),100);};
window.actionEdit=function(){if(!selStu){showT('اضغط مطولاً على اسم الطالب');return;}const{sid,k,stid}=selStu;const s=ST[sid][k].find(x=>x.id===stid);if(!s)return;mM='edit';mT2={sid,k,stid};document.getElementById('mT').textContent='تعديل الاسم';document.getElementById('mI').value=s.name;document.getElementById('mo').classList.add('show');setTimeout(()=>document.getElementById('mI').focus(),100);};
window.actionDel=function(){if(!selStu){showT('اضغط مطولاً على اسم الطالب');return;}const{sid,k,stid}=selStu;if(confirm('هل تريد حذف هذا الطالب؟')){ST[sid][k]=ST[sid][k].filter(s=>s.id!==stid);if(ATT[sid][k])delete ATT[sid][k][stid];saveStudents();fbS();selStu=null;if(curPop.sg){renderPopList();renderPopSum();}updStats();updBtns();showT('تم الحذف ✅');}};

window.sendWA=function(){
  if(!curPop.sg)return;const{sg,k}=curPop;const sts=ST[sg.id][k]||[];const att=ATT[sg.id][k]||{};
  const now=new Date();const h=toH(now);
  const absList=sts.filter(s=>att[s.id]===true);const pct=sts.length>0?Math.round(absList.length/sts.length*100):0;
  let msg=`📋 *غياب ${sg.name} - ${sg.cls[parseInt(k.slice(1))]}*\n📅 ${DN[now.getDay()]} ${h.d}/${h.m}/${h.y}هـ\n\n`;
  if(absList.length===0){msg+='✅ لا يوجد غياب اليوم';}
  else{absList.forEach((s,i)=>{msg+=`${i+1}. ${s.name}\n`;});msg+=`\n📊 الغياب: ${absList.length} من ${sts.length} (${pct}%)`;}
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
};

document.getElementById('mO').onclick=async()=>{
  const v=document.getElementById('mI').value.trim();if(!v){showT('يرجى إدخال اسم');return;}
  if(mM==='add'){const newId=`su_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;ST[mT2.sid][mT2.k].push({id:newId,name:v});}
  else{const s=ST[mT2.sid][mT2.k].find(x=>x.id===mT2.stid);if(s)s.name=v;}
  await saveStudents();await fbS();selStu=null;
  if(curPop.sg){renderPopList();renderPopSum();}
  updStats();updBtns();showT(mM==='add'?'تمت الإضافة ✅':'تم التعديل ✅');
  document.getElementById('mo').classList.remove('show');
};
document.getElementById('mC').onclick=()=>document.getElementById('mo').classList.remove('show');
document.getElementById('mI').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('mO').click();});
function showT(msg){const t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

await fbL();fbLs();
const now=new Date();
setTimeout(async()=>{await fbL();fbLs();},(new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now));
</script>
