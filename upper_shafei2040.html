<style>

body{font-family:'Tajawal',sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e;padding:10px 8px 80px;}
header{text-align:center;margin-bottom:10px;padding:14px;background:linear-gradient(120deg,#1a1a2e,#0f3460);border-radius:14px;box-shadow:0 4px 16px rgba(15,52,96,.25)}

.sbg{margin-right:auto;background:rgba(255,255,255,.2);padding:2px 9px;border-radius:20px;font-size:.65rem;font-weight:700}

.cls-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.cls-btn{border:none;border-radius:11px;padding:12px 8px;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;transition:transform .15s}

.stage2 .cls-btn{background:#e0f4ff;color:#004c8c;box-shadow:0 2px 8px rgba(0,119,182,.12)}

.pop-ov.show{display:flex}
.pop{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;animation:su .22s ease}

.pop-sub{font-size:.7rem;color:#999;margin-top:2px}

.stu-list{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}

.stu-row.absent{background:#fff0f0}

.stu-num{font-size:.65rem;color:#bbb;font-weight:700;width:18px;text-align:center;flex-shrink:0}
.stu-name{flex:1;font-size:.82rem;font-weight:600;line-height:1.3}
.stu-chk{width:28px;height:28px;border-radius:8px;background:#f0f0f0;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;flex-shrink:0}

.btn-wa{background:#25d366;color:#fff}
.btn-add{background:#6a0dad;color:#fff}
.btn-edit{background:#0077b6;color:#fff}
.btn-del{background:#eee;color:#555}

.bc{background:#6a0dad;color:#fff}.bx{background:#eee;color:#444}

.ls-dots span:nth-child(3){animation-delay:.4s}

</style>

// مفتاح قائمة الطلاب في Firebase (دائم)
const STUDENTS_KEY='upper_students_v1';

// مفتاح الغياب اليومي
function todayKey(){const d=new Date();return`upper_d_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;}

let ST={};
let ATT={};
let sv=false;
let fbListener=null;
let curPop={sg:null,k:null};
let selStu=null;

// بناء قائمة الطلاب من القائمة الأصلية
function buildDefaultST(){
  const result={};
  SM.forEach((sg,si)=>{
    result[sg.id]={};
    sg.cls.forEach((_,ci)=>{
      result[sg.id][`c${ci}`]=(DS[sg.id][`c${ci}`]||[]).map((n,i)=>({id:`s${si}c${ci}i${i}`,name:n}));
    });
  });
  return result;
}

function initAtt(){SM.forEach(sg=>{ATT[sg.id]={};sg.cls.forEach((_,ci)=>{ATT[sg.id][`c${ci}`]={};});});}

function setSUI(s,m){
  document.getElementById('sDot').className='sd '+s;
  document.getElementById('sTxt').textContent=m;
  if(s==='synced')document.getElementById('sTime').textContent='آخر تحديث: '+new Date().toLocaleTimeString('ar');
}

// حفظ قائمة الطلاب في Firebase
async function saveStudents(){
  try{await set(ref(db,STUDENTS_KEY),ST);}
  catch(e){console.error('خطأ في حفظ الطلاب',e);}
}

// حفظ الغياب في Firebase
async function fbS(){
  if(sv)return;sv=true;setSUI('syncing','جارٍ الحفظ...');
  try{await set(ref(db,todayKey()),ATT);setSUI('synced','محفوظ ✅');}
  catch(e){setSUI('error','خطأ في الحفظ');}
  finally{sv=false;}
}

// تحميل البيانات من Firebase
async function fbL(){
  setSUI('syncing','جارٍ التحميل...');
  initAtt();
  try{
    // تحميل قائمة الطلاب
    const stuSnap=await get(ref(db,STUDENTS_KEY));
    if(stuSnap.exists()){
      ST=stuSnap.val();
      // تأكد من وجود كل الفصول
      SM.forEach((sg,si)=>{
        if(!ST[sg.id])ST[sg.id]={};
        sg.cls.forEach((_,ci)=>{
          if(!ST[sg.id][`c${ci}`])ST[sg.id][`c${ci}`]=(DS[sg.id][`c${ci}`]||[]).map((n,i)=>({id:`s${si}c${ci}i${i}`,name:n}));
        });
      });
    }else{
      // أول مرة: بناء القائمة وحفظها
      ST=buildDefaultST();
      await saveStudents();
    }

    // تحميل الغياب
    const attSnap=await get(ref(db,todayKey()));
    if(attSnap.exists()){
      const data=attSnap.val();
      SM.forEach(sg=>{sg.cls.forEach((_,ci)=>{const k=`c${ci}`;if(data[sg.id]&&data[sg.id][k])ATT[sg.id][k]=data[sg.id][k];});});
      setSUI('synced','متزامن ✅');
    }else{setSUI('synced','يوم جديد ✅');}
  }catch(e){setSUI('error','تعذر الاتصال');}
  renderAll();
  setTimeout(()=>{const ls=document.getElementById('ls');if(ls){ls.classList.add('hide');setTimeout(()=>ls.remove(),400);}},300);
}

function fbLs(){
  if(fbListener)fbListener();
  fbListener=onValue(ref(db,todayKey()),(snap)=>{
    if(!snap.exists()||sv)return;
    const data=snap.val();
    SM.forEach(sg=>{sg.cls.forEach((_,ci)=>{const k=`c${ci}`;if(data[sg.id]&&data[sg.id][k])ATT[sg.id][k]=data[sg.id][k];});});
    setSUI('synced','متزامن ✅');
    updStats();updBtns();
    if(curPop.sg)renderPopList();
  });
}

window.manualRefresh=async()=>{await fbL();fbLs();showT('تم التحديث ✅');};

function clsAbs(sid,k){return Object.values(ATT[sid][k]||{}).filter(v=>v).length;}
function sgAbs(sid){let t=0;SM.find(s=>s.id===sid).cls.forEach((_,ci)=>{t+=clsAbs(sid,`c${ci}`);});return t;}
function sgTotal(sid){let t=0;ST[sid]&&Object.values(ST[sid]).forEach(arr=>{t+=arr.length;});return t;}

function updStats(){
  let g=0,gp=0;
  SM.forEach((sg,si)=>{
    const abs=sgAbs(sg.id);const tot=sgTotal(sg.id);
    const pct=tot>0?Math.round(abs/tot*100):0;
    g+=abs;gp+=tot;
    document.getElementById(`gS${si+1}`).textContent=abs;
    document.getElementById(`pS${si+1}`).textContent=pct+'%';
  });
  document.getElementById('gAll').textContent=g;
  document.getElementById('gPct').textContent=(gp>0?Math.round(g/gp*100):0)+'%';
}

function updBtns(){
  SM.forEach(sg=>{
    sg.cls.forEach((_,ci)=>{
      const k=`c${ci}`;const cnt=clsAbs(sg.id,k);
      const b=document.getElementById(`badge_${sg.id}_${k}`);
      if(b){b.textContent=cnt;b.style.display=cnt>0?'block':'none';}
      const a=document.getElementById(`clsabs_${sg.id}_${k}`);
      if(a)a.textContent=`غياب: ${cnt}`;
    });
    const bg=document.getElementById(`bg_${sg.id}`);
    if(bg)bg.textContent=`غياب: ${sgAbs(sg.id)}`;
  });
}

function toH(date){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  const jd=Math.floor((1461*(y+4800+Math.floor((m-14)/12)))/4)+Math.floor((367*(m-2-12*(Math.floor((m-14)/12))))/12)-Math.floor((3*(Math.floor((y+4900+Math.floor((m-14)/12))/100)))/4)+d-32075;
  let l=jd-1948440+10632;
  const n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  const j=(Math.floor((10985-l)/5316))*(Math.floor((50*l)/17719))+(Math.floor(l/5670))*(Math.floor((43*l)/15238));
  l=l-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29;
  const hm=Math.floor((24*l)/709);
  const hd=l-Math.floor((709*hm)/24)-2;
  return{y:30*n+j-30,m:hm,d:hd<1?1:hd};
}
function hMo(m){return['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'][m-1]||'';}

function renderAll(){
  const now=new Date();const h=toH(now);
  document.getElementById('hDate').textContent=`${DN[now.getDay()]} ${h.d} ${hMo(h.m)} ${h.y}هـ`;
  updStats();
  const cont=document.getElementById('stg');cont.innerHTML='';
  SM.forEach((sg,si)=>{
    const block=document.createElement('div');block.className=`stb ${sg.color}`;
    let btns='';
    sg.cls.forEach((cls,ci)=>{
      const k=`c${ci}`;const cnt=clsAbs(sg.id,k);
      btns+=`<button class="cls-btn" onclick="openPop('${sg.id}','${k}')"><span class="cls-badge" id="badge_${sg.id}_${k}" style="display:${cnt>0?'block':'none'}">${cnt}</span><span class="cls-name">${cls}</span><span class="cls-abs" id="clsabs_${sg.id}_${k}">غياب: ${cnt}</span></button>`;
    });
    block.innerHTML=`<div class="sth" onclick="toggleSt('b_${sg.id}')"><span class="si">${sg.icon}</span>المرحلة ${sg.name}<span class="sbg" id="bg_${sg.id}">غياب: ${sgAbs(sg.id)}</span><span style="margin-right:auto;font-size:.75rem" id="arr_${sg.id}">▾</span></div><div class="cls-body ${si===0?'open':''}" id="b_${sg.id}"><div class="cls-grid">${btns}</div></div>`;
    cont.appendChild(block);
  });
}

window.toggleSt=function(bid){
  const b=document.getElementById(bid);
  const sid=bid.replace('b_','');
  const arr=document.getElementById(`arr_${sid}`);
  if(b.classList.contains('open')){b.classList.remove('open');arr.textContent='▾';}
  else{b.classList.add('open');arr.textContent='▴';}
};

window.openPop=function(sid,k){
  try{
    curPop={sg:SM.find(s=>s.id===sid),k};selStu=null;
    document.getElementById('popTitle').textContent=`${curPop.sg.name} — ${curPop.sg.cls[parseInt(k.slice(1))]}`;
    renderPopList();renderPopSum();
    document.getElementById('popOv').classList.add('show');
    history.pushState({popup:true},'');
  }catch(e){showT('حاول مجدداً');}
};

window.addEventListener('popstate',function(e){
  if(document.getElementById('popOv').classList.contains('show')){
    document.getElementById('popOv').classList.remove('show');
  }
});

window.closePop=function(e){if(e.target===document.getElementById('popOv'))document.getElementById('popOv').classList.remove('show');};

function renderPopList(){
  const{sg,k}=curPop;
  const sts=ST[sg.id][k]||[];
  const att=ATT[sg.id][k]||{};
  const list=document.getElementById('stuList');list.innerHTML='';
  sts.forEach((s,idx)=>{
    const ab=att[s.id]===true;
    const sel=selStu&&selStu.stid===s.id;
    const row=document.createElement('div');
    row.className=`stu-row${ab?' absent':''}${sel?' selected':''}`;
    row.innerHTML=`<span class="stu-num">${idx+1}</span><span class="stu-name">${s.name}</span><div class="stu-chk">${ab?'غ':''}</div>`;
    row.onclick=()=>tglStu(sg.id,k,s.id,row);
    let lp=null;
    row.addEventListener('touchstart',()=>{lp=setTimeout(()=>{selStu={sid:sg.id,k,stid:s.id};renderPopList();showT('✅ تم تحديد الطالب');},600);},{passive:true});
    row.addEventListener('touchend',()=>{if(lp)clearTimeout(lp);},{passive:true});
    let mlp=null;
    row.addEventListener('mousedown',()=>{mlp=setTimeout(()=>{selStu={sid:sg.id,k,stid:s.id};renderPopList();showT('✅ تم تحديد الطالب');},600);});
    row.addEventListener('mouseup',()=>{if(mlp)clearTimeout(mlp);});
    list.appendChild(row);
  });
}

function renderPopSum(){
  const{sg,k}=curPop;
  const sts=ST[sg.id][k]||[];
  const abs=clsAbs(sg.id,k);
  const pct=sts.length>0?Math.round(abs/sts.length*100):0;
  document.getElementById('popSum').innerHTML=`<span>غياب: <b>${abs}</b></span><span>حضور: <b>${sts.length-abs}</b></span><span>الإجمالي: <b>${sts.length}</b></span><span>النسبة: <b>${pct}%</b></span>`;
}

async function tglStu(sid,k,stid,row){
  if(!ATT[sid][k])ATT[sid][k]={};
  ATT[sid][k][stid]=!ATT[sid][k][stid];
  const ab=ATT[sid][k][stid];
  row.classList.toggle('absent',ab);
  row.querySelector('.stu-chk').textContent=ab?'غ':'';
  updStats();updBtns();renderPopSum();
  await fbS();
}

window.actionAdd=function(){
  if(!curPop.sg){showT('افتح فصلاً أولاً');return;}
  mM='add';mT2={sid:curPop.sg.id,k:curPop.k};
  document.getElementById('mT').textContent='إضافة طالب';
  document.getElementById('mI').value='';
  document.getElementById('mo').classList.add('show');
  setTimeout(()=>document.getElementById('mI').focus(),100);
};

window.actionEdit=function(){
  if(!selStu){showT('اضغط مطولاً على اسم الطالب');return;}
  const{sid,k,stid}=selStu;
  const s=ST[sid][k].find(x=>x.id===stid);if(!s)return;
  mM='edit';mT2={sid,k,stid};
  document.getElementById('mT').textContent='تعديل الاسم';
  document.getElementById('mI').value=s.name;
  document.getElementById('mo').classList.add('show');
  setTimeout(()=>document.getElementById('mI').focus(),100);
};

window.actionDel=function(){
  if(!selStu){showT('اضغط مطولاً على اسم الطالب');return;}
  const{sid,k,stid}=selStu;
  if(confirm('هل تريد حذف هذا الطالب؟')){
    ST[sid][k]=ST[sid][k].filter(s=>s.id!==stid);
    if(ATT[sid][k])delete ATT[sid][k][stid];
    saveStudents();
    fbS();
    selStu=null;
    if(curPop.sg)renderPopList();
    renderPopSum();
    updStats();updBtns();
    showT('تم الحذف ✅');
  }
};

window.sendWA=function(){
  if(!curPop.sg)return;
  const{sg,k}=curPop;
  const sts=ST[sg.id][k]||[];
  const att=ATT[sg.id][k]||{};
  const now=new Date();const h=toH(now);
  const absList=sts.filter(s=>att[s.id]===true);
  const pct=sts.length>0?Math.round(absList.length/sts.length*100):0;
  let msg=`📋 *غياب ${sg.name} - ${sg.cls[parseInt(k.slice(1))]}*\n`;
  msg+=`📅 ${DN[now.getDay()]} ${h.d}/${h.m}/${h.y}هـ\n\n`;
  if(absList.length===0){msg+='✅ لا يوجد غياب اليوم';}
  else{
    absList.forEach((s,i)=>{msg+=`${i+1}. ${s.name}\n`;});
    msg+=`\n📊 الغياب: ${absList.length} من ${sts.length} (${pct}%)`;
  }
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
};

let mM=null,mT2=null;
document.getElementById('mO').onclick=async()=>{
  const v=document.getElementById('mI').value.trim();
  if(!v){showT('يرجى إدخال اسم');return;}
  if(mM==='add'){
    const newId=`su_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    ST[mT2.sid][mT2.k].push({id:newId,name:v});
  }else{
    const s=ST[mT2.sid][mT2.k].find(x=>x.id===mT2.stid);
    if(s)s.name=v;
  }
  await saveStudents();
  await fbS();
  selStu=null;
  if(curPop.sg){renderPopList();renderPopSum();}
  updStats();updBtns();
  showT(mM==='add'?'تمت الإضافة ✅':'تم التعديل ✅');
  document.getElementById('mo').classList.remove('show');
};

document.getElementById('mC').onclick=()=>document.getElementById('mo').classList.remove('show');
document.getElementById('mI').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('mO').click();});

function showT(msg){const t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

await fbL();fbLs();
const now=new Date();
const msToMidnight=(new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now);
setTimeout(async()=>{await fbL();fbLs();},msToMidnight);
</script>
